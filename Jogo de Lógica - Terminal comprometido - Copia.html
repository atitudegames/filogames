<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo Lógica: Erradicação v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #050505;
            color: #22c55e;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
            user-select: none;
        }
        
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 50;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .error-shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
            color: #ef4444 !important;
        }
        .flash-red { transition: background-color 0.1s; background-color: rgba(239, 68, 68, 0.2) !important; }
        .flash-green { transition: background-color 0.1s; background-color: rgba(34, 197, 94, 0.2) !important; }

        .slot-box {
            border: 2px dashed #22c55e;
            min-height: 50px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            text-align: center;
        }
        .slot-box:hover { background-color: rgba(34, 197, 94, 0.1); }
        .slot-filled { border-style: solid; background-color: rgba(34, 197, 94, 0.05); }
        
        .phrase-card {
            background-color: #111;
            border: 1px solid #22c55e;
            cursor: pointer;
            transition: all 0.2s;
        }
        .phrase-card:hover { background-color: #1a1a1a; transform: scale(1.02); }
        .phrase-card.selected {
            background-color: #22c55e; color: #000; font-weight: bold;
        }
        
        input[type="text"] {
            background: #000; border: 1px solid #22c55e; color: #22c55e;
            outline: none; padding: 10px; font-family: 'Courier New', Courier, monospace;
        }
        input[type="text"]:focus { box-shadow: 0 0 10px rgba(34, 197, 94, 0.5); }

        canvas { touch-action: none; }
        
        /* Oculta scrollbar mas permite rolagem */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #22c55e; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">
    <div class="crt-overlay"></div>
    <button onclick="toggleFullScreen()" class="fixed top-4 right-4 z-[100] bg-gray-900 border border-green-500 text-green-500 px-3 py-1 rounded hover:bg-green-700 hover:text-black transition-colors text-xs font-bold uppercase shadow-[0_0_10px_rgba(34,197,94,0.3)]">Tela Cheia</button>

    <header id="hud" class="w-full max-w-5xl flex justify-between items-center border-b border-green-500 pb-2 mb-4 hidden">
        <div class="w-1/3">
            <h1 class="text-xl font-bold tracking-widest text-green-500">SYS.DEFENSE.LOGIC</h1>
            <p id="player-display" class="text-xs text-blue-400 mt-1">Operador: <span id="op-name"></span></p>
            <p id="level-display" class="text-sm opacity-80 mt-1 text-gray-300">Nível: -- | Fase: --/3</p>
        </div>
        
        <div class="w-1/3 text-center hidden" id="timer-container">
            <p class="text-xs text-yellow-500 font-bold uppercase mb-1">Tempo Restante</p>
            <div id="timer-display" class="text-3xl font-bold text-yellow-400 font-mono animate-pulse drop-shadow-[0_0_8px_rgba(234,179,8,0.8)]">00:00</div>
        </div>

        <div class="w-1/3 text-right">
            <p class="text-sm mb-1 text-red-500 font-bold">Nível de Infecção Viral</p>
            <div class="w-full bg-gray-900 border border-red-500 h-4 relative">
                <div id="infection-bar" class="bg-red-600 h-full transition-all duration-500" style="width: 20%;"></div>
            </div>
        </div>
    </header>

    <main id="game-container" class="w-full max-w-5xl relative z-10 flex-grow">
        <!-- Renderizado dinamicamente -->
    </main>

    <footer class="w-full max-w-5xl text-center mt-6 pt-4 border-t border-gray-800 text-xs text-gray-600 z-10 relative pb-2">
        Desenvolvido por <a href="https://instagram.com/marcoasf_" target="_blank" class="text-blue-500 font-bold hover:text-blue-400 underline transition-colors">Marco Antonio da Silva Filho</a> - Professor de Filosofia com o auxílio de IA (Gemini e ChatGPT)
    </footer>

    <script>
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Erro ao ativar tela cheia: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
       // ==========================================
        // SISTEMA DE ÁUDIO SINTETIZADO E STREAMING
        // ==========================================
        const AudioEngine = {
            ctx: null, initialized: false,
            
            // Cria o elemento de áudio para a música de fundo
            // Coloquei um link de uma música tensa royalty-free de exemplo
            bgmAudio: new Audio('https://cdn.pixabay.com/download/audio/2025/09/06/audio_441d8d0d90.mp3?filename=nastelbom-tense-400740.mp3'),
            
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
                this.initialized = true;
            },

            playClick() {
                if (!this.initialized) this.init();
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(600, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1000, this.ctx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.1);
            },

            playSuccess() {
                if (!this.initialized) this.init();
                const notes = [440, 554.37, 659.25, 880]; 
                notes.forEach((freq, i) => {
                    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.type = 'triangle'; osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.1, this.ctx.currentTime + i * 0.1 + 0.05);
                    gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + i * 0.1 + 0.3);
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.start(this.ctx.currentTime + i * 0.1); osc.stop(this.ctx.currentTime + i * 0.1 + 0.3);
                });
            },

            playError() {
                if (!this.initialized) this.init();
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.4);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.4);
            },

            startBGM() {
                // Configura a música de fundo para repetir e ajusta o volume
                this.bgmAudio.loop = true;
                this.bgmAudio.volume = 0.8; // Volume mais baixo para não ofuscar os beeps
                
                // O .play() retorna uma Promise. O .catch previne erros no console 
                // caso o navegador bloqueie o áudio antes da interação do usuário.
                this.bgmAudio.play().catch(e => {
                    console.log("Áudio ambiente aguardando interação do Operador...");
                });
            },

            stopBGM() {
                // Faz um efeito de "fade out" rápido e pausa a música
                let fadeAudio = setInterval(() => {
                    if (this.bgmAudio.volume > 0.05) {
                        this.bgmAudio.volume -= 0.05;
                    } else {
                        clearInterval(fadeAudio);
                        this.bgmAudio.pause();
                        this.bgmAudio.currentTime = 0; // Reseta a música para o início
                    }
                }, 100);
            }
        };

        // Força a inicialização do áudio no primeiro clique em qualquer lugar
        document.body.addEventListener('click', () => {
            if (!AudioEngine.initialized || (AudioEngine.ctx && AudioEngine.ctx.state === 'suspended')) {
                AudioEngine.init();
            }
        }, { once: true });


        // ==========================================
        // BANCO DE DADOS LÓGICO
        // ==========================================
        const dbLevel1 = [
            { bank: [ { id: 'p1', text: "Todos os malwares danificam o sistema." }, { id: 'p2', text: "O Ransomware é um malware." }, { id: 'c',  text: "Logo, o Ransomware danifica o sistema." }, { id: 'n1', text: "Desconecte o cabo de rede agora!" }, { id: 'n2', text: "Qual a porta de acesso?" } ] },
            { bank: [ { id: 'p1', text: "Se a senha for fraca, o acesso é invadido." }, { id: 'p2', text: "A senha do admin era fraca." }, { id: 'c',  text: "Portanto, o acesso do admin foi invadido." }, { id: 'n1', text: "Lembre-se de trocar a senha." }, { id: 'n2', text: "Nossa rede é rápida?" } ] },
            { bank: [ { id: 'p1', text: "Nenhum sistema isolado pode ser hackeado remotamente." }, { id: 'p2', text: "O Servidor X é um sistema isolado." }, { id: 'c',  text: "Logo, o Servidor X não pode ser hackeado remotamente." }, { id: 'n1', text: "Onde fica a sala do servidor?" }, { id: 'n2', text: "Iniciando firewall local..." } ] },
            { bank: [ { id: 'p1', text: "Todos os ataques de phishing usam engenharia social." }, { id: 'p2', text: "Este email é um ataque de phishing." }, { id: 'c',  text: "Logo, este email usa engenharia social." }, { id: 'n1', text: "Parabéns, você ganhou um prêmio!" }, { id: 'n2', text: "Não clique naquele link, por favor." } ] },
            { bank: [ { id: 'p1', text: "Arquivos criptografados exigem uma chave para leitura." }, { id: 'p2', text: "O banco de dados está criptografado." }, { id: 'c',  text: "Logo, o banco de dados exige uma chave para leitura." }, { id: 'n1', text: "Salve a chave em um pendrive seguro." }, { id: 'n2', text: "O backup foi feito ontem?" } ] }
        ];

        const dbLevel2_Fase1 = [

            { text: "Nenhum dado financeiro é público.", type: 'E' }, { text: "Nenhum hacker dorme em serviço.", type: 'E' },

            { text: "Alguma porta não está filtrada.", type: 'O' }, { text: "Alguns pacotes não chegaram ao destino.", type: 'O' }

        const dbLevel2_Fase2 = [

            { text: "Todo sistema de criptografia assimétrica baseado em chaves primas depende diretamente da complexidade computacional para sua segurança.", type: 'A' },
            { text: "Nenhum algoritmo desenvolvido sem testes de segurança robustos ao longo de meses é imune a ataques de força bruta no ambiente corporativo.", type: 'E' },
            { text: "Nenhuma corporação transnacional com políticas de dados abertos é totalmente blindada contra vazamentos de informações críticas.", type: 'E' },
            { text: "Algumas inteligências artificiais treinadas com bancos de dados altamente enviesados apresentam comportamentos discriminatórios em suas análises preditivas.", type: 'I' },
            { text: "Alguns métodos de invasão silenciosa explorando falhas de dia-zero requerem profundo conhecimento da arquitetura do processador alvo.", type: 'I' },
            { text: "Alguns pacotes de dados enviados durante o horário de pico da rede mundial não são validados corretamente pelo servidor principal de autenticação.", type: 'O' },
            { text: "Alguns analistas de segurança cibernética com vasta experiência técnica não estão preparados para lidar com as novas ameaças quânticas.", type: 'O' }
        ];

        const dbLevel2_Fase3 = [
            { text: "Todos os roteadores são dispositivos de rede.", opts: ["Todo R é D", "Algum R é D", "Nenhum R é D", "Todo D é R"], ans: 0 },
            { text: "Nenhum cavalo de troia é seguro.", opts: ["Todo C não é S", "Nenhum C é S", "Algum C não é S", "Algum S não é C"], ans: 1 },
            { text: "Alguns programadores são éticos.", opts: ["Todo P é E", "Nenhum P é E", "Algum P é E", "Algum E não é P"], ans: 2 },
            { text: "Alguns servidores não estão respondendo.", opts: ["Algum S é R", "Nenhum S é R", "Algum S não é R", "Todo S não é R"], ans: 2 },
            { text: "Qualquer firewall bloqueia invasões.", opts: ["Algum F é B", "Nenhum F é B", "Todo B é F", "Todo F é B"], ans: 3 },
            { text: "Existem malwares que são indetectáveis.", opts: ["Algum M é I", "Todo M é I", "Nenhum M é I", "Algum I não é M"], ans: 0 },
            { text: "Nem todo código é perfeito.", opts: ["Nenhum C é P", "Algum C não é P", "Todo C não é P", "Algum C é P"], ans: 1 }
        ];

        const dbLevel3 = [
            { name: "Barbara (AAA-1)", desc: "<p><span class='text-blue-400 font-bold'>P1:</span> Todo M é P.</p><p><span class='text-blue-400 font-bold'>P2:</span> Todo S é M.</p><p class='pt-2 border-t border-gray-700'><span class='text-red-400 font-bold'>C:</span> Logo, Todo S é P.</p>", hint: "Sombree áreas vazias ditadas pelas premissas universais.", target: [1, 0, 1, 1, 1, 0, 0] },
            { name: "Celarent (EAE-1)", desc: "<p><span class='text-blue-400 font-bold'>P1:</span> Nenhum M é P.</p><p><span class='text-blue-400 font-bold'>P2:</span> Todo S é M.</p><p class='pt-2 border-t border-gray-700'><span class='text-red-400 font-bold'>C:</span> Logo, Nenhum S é P.</p>", hint: "Sombree a intersecção de M e P, e S fora de M.", target: [1, 0, 0, 1, 0, 1, 1] },
            { name: "Darii (AII-1)", desc: "<p><span class='text-blue-400 font-bold'>P1:</span> Todo M é P.</p><p><span class='text-blue-400 font-bold'>P2:</span> Algum S é M.</p><p class='pt-2 border-t border-gray-700'><span class='text-red-400 font-bold'>C:</span> Logo, Algum S é P.</p>", hint: "Sombree M fora de P. Depois coloque o X na intersecção restante entre S e M.", target: [0, 0, 1, 0, 1, 0, 2] },
            { name: "Ferio (EIO-1)", desc: "<p><span class='text-blue-400 font-bold'>P1:</span> Nenhum M é P.</p><p><span class='text-blue-400 font-bold'>P2:</span> Algum S é M.</p><p class='pt-2 border-t border-gray-700'><span class='text-red-400 font-bold'>C:</span> Logo, Algum S não é P.</p>", hint: "Sombree M intersecção P. Depois coloque X na intersecção restante de S e M.", target: [0, 0, 0, 0, 2, 1, 1] },
            { name: "Camestres (AEE-2)", desc: "<p><span class='text-blue-400 font-bold'>P1:</span> Todo P é M.</p><p><span class='text-blue-400 font-bold'>P2:</span> Nenhum S é M.</p><p class='pt-2 border-t border-gray-700'><span class='text-red-400 font-bold'>C:</span> Logo, Nenhum S é P.</p>", hint: "Sombree P fora de M. Sombree intersecção de S e M.", target: [0, 1, 0, 1, 1, 0, 1] },
            { name: "Bocardo (OAO-3)", desc: "<p><span class='text-blue-400 font-bold'>P1:</span> Algum M não é P.</p><p><span class='text-blue-400 font-bold'>P2:</span> Todo M é S.</p><p class='pt-2 border-t border-gray-700'><span class='text-red-400 font-bold'>C:</span> Logo, Algum S não é P.</p>", hint: "Sombree M fora de S. Depois coloque X em M fora de P que sobrou.", target: [0, 0, 1, 0, 2, 1, 0] }
        ];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // ==========================================
        // ESTADO GLOBAL E TIMER
        // ==========================================
        const gameState = {
            playerName: "Operador-77", level: 0, phase: 1, infection: 20,
            isAvulso: false, timerInterval: null, timeLeft: 0, timerActive: false,
            lastFailedDiagram: null,
            l1: { challenges: [], currentIdx: 0, selectedId: null, slots: { s_p1: null, s_p2: null, s_c: null, s_n1: null, s_n2: null } },
            l2: { qFase1: [], qFase2: [], qFase3: [], questionsCorrect: 0 },
            l3: { challenges: [], currentIdx: 0, regions: [0, 0, 0, 0, 0, 0, 0] }
        };

        const container = document.getElementById('game-container');
        const hud = document.getElementById('hud');
        const infectionBar = document.getElementById('infection-bar');

        function startTimer(seconds) {
            clearInterval(gameState.timerInterval);
            gameState.timeLeft = seconds;
            gameState.timerActive = true;
            document.getElementById('timer-container').classList.remove('hidden');
            
            const display = document.getElementById('timer-display');
            display.innerText = `00:${seconds < 10 ? '0'+seconds : seconds}`;

            gameState.timerInterval = setInterval(() => {
                gameState.timeLeft--;
                let secs = gameState.timeLeft;
                display.innerText = `00:${secs < 10 ? '0'+secs : secs}`;
                
                if(secs <= 10) display.classList.add('text-red-500');
                else display.classList.remove('text-red-500');

                if(gameState.timeLeft <= 0) {
                    stopTimer();
                    updateInfection(100, "O tempo limite expirou! O vírus sobrecarregou a CPU.");
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(gameState.timerInterval);
            gameState.timerActive = false;
            document.getElementById('timer-container').classList.add('hidden');
            document.getElementById('timer-display').classList.remove('text-red-500');
        }

        function updateInfection(amount, msg = "") {
            gameState.infection += amount;
            if (gameState.infection < 0) gameState.infection = 0;
            
            infectionBar.style.width = `${gameState.infection}%`;
            
            if (amount > 0) {
                document.body.classList.add('flash-red'); setTimeout(() => document.body.classList.remove('flash-red'), 200);
            } else if (amount < 0) {
                document.body.classList.add('flash-green'); setTimeout(() => document.body.classList.remove('flash-green'), 200);
            }

            if (gameState.infection >= 100) {
                gameState.infection = 100; 
                stopTimer();
                renderGameOver(msg);
            }
        }

        function showMessage(msg, isError = false) {
            const div = document.createElement('div');
            div.className = `fixed bottom-20 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded font-bold z-50 transition-opacity shadow-lg text-center ${isError ? 'bg-red-600 text-white' : 'bg-green-600 text-black'}`;
            div.innerText = msg; document.body.appendChild(div);
            setTimeout(() => {
                div.style.opacity = '0'; setTimeout(() => div.remove(), 300);
            }, 2000);
        }

        function resetGame() {
            stopTimer();
            gameState.infection = 20; gameState.level = 0; gameState.phase = 1; gameState.isAvulso = false;
            gameState.lastFailedDiagram = null;
            AudioEngine.stopBGM(); renderIntro();
        }

        function prepareData() {
            // L1: sorteia desafios e embara as opções de cada banco
            gameState.l1.challenges = shuffle([...dbLevel1]).slice(0, 3).map(ch => ({ ...ch, shuffledBank: shuffle([...ch.bank]) }));
            gameState.l1.currentIdx = 0;
            gameState.l1.slots = { s_p1: null, s_p2: null, s_c: null, s_n1: null, s_n2: null };
            gameState.l1.selectedId = null;
            
            // L2: sorteia 4 frases para cada fase
            gameState.l2.qFase1 = shuffle([...dbLevel2_Fase1]).slice(0, 4);
            gameState.l2.qFase2 = shuffle([...dbLevel2_Fase2]).slice(0, 4);
            gameState.l2.qFase3 = shuffle([...dbLevel2_Fase3]).slice(0, 4);
            gameState.l2.questionsCorrect = 0;

            // L3: sorteia 3 diagramas
            gameState.l3.challenges = shuffle([...dbLevel3]).slice(0, 3);
            gameState.l3.currentIdx = 0;
            gameState.l3.regions = [0, 0, 0, 0, 0, 0, 0];
        }

        // ==========================================
        // TELAS DO SISTEMA (MENUS E FINAIS)
        // ==========================================

        function renderIntro() {
            hud.classList.add('hidden');
            container.innerHTML = `
                <div class="text-center space-y-6 mt-12" id="intro-main">
                    <h1 class="text-5xl font-bold mb-2 animate-pulse text-green-500">TERMINAL COMPROMETIDO</h1>
                    <p class="text-lg max-w-3xl mx-auto text-gray-300">Um vírus baseado em falácias lógicas invadiu o mainframe. Para isolá-lo, você deve purgar o sistema resolvendo barreiras de segurança baseadas em <b>Lógica Formal Clássica</b>.</p>
                    
                    <div class="mt-6 inline-block bg-gray-900 p-6 rounded border border-green-500 text-left shadow-lg w-full max-w-md">
                        <label class="block mb-2 font-bold text-sm text-green-400 text-center">Insira sua credencial de Operador:</label>
                        <input type="text" id="input-name" placeholder="Ex: Neo, Alice..." value="${gameState.playerName}" class="w-full text-xl text-center uppercase" maxlength="15" autocomplete="off">
                    </div>

                    <div class="pt-6 flex flex-col md:flex-row justify-center gap-4">
                        <button onclick="startGame(false)" class="px-8 py-4 bg-green-600 text-black font-bold text-xl hover:bg-green-500 rounded border-2 border-green-400 uppercase shadow-[0_0_15px_rgba(34,197,94,0.5)] transition-transform hover:scale-105">
                            MODO CAMPANHA
                        </button>
                        <button onclick="showAvulsoMenu()" class="px-8 py-4 bg-blue-900 text-white font-bold text-xl hover:bg-blue-800 rounded border-2 border-blue-500 uppercase transition-transform hover:scale-105">
                            ACESSO DIRETO (AVULSO)
                        </button>
                    </div>
                </div>

                <div class="text-center space-y-6 mt-12 hidden" id="intro-avulso">
                    <h1 class="text-4xl font-bold mb-6 text-blue-400">SELEÇÃO DE MÓDULO (TREINAMENTO)</h1>
                    <div class="flex flex-col gap-4 max-w-md mx-auto">
                        <button onclick="startGame(true, 1)" class="p-4 bg-gray-800 border border-green-500 hover:bg-green-900 text-lg rounded font-bold transition-all hover:scale-105">NÍVEL 1: Anatomia do Argumento</button>
                        <button onclick="startGame(true, 2)" class="p-4 bg-gray-800 border border-yellow-500 hover:bg-yellow-900 text-lg rounded font-bold transition-all hover:scale-105">NÍVEL 2: Oposições e Formalização</button>

        function startGame(avulso = false, targetLevel = 1) {
            AudioEngine.init(); AudioEngine.playClick(); AudioEngine.startBGM();

            if(nameInput) gameState.playerName = nameInput.toUpperCase();
            document.getElementById('op-name').innerText = gameState.playerName;
            
            gameState.isAvulso = avulso;
            prepareData(); 
            startLevel(targetLevel, 1);
        }

        function renderGameOver(customMsg = "") {
            AudioEngine.playError(); AudioEngine.stopBGM(); hud.classList.add('hidden');
            
            let extraHtml = "";
            if (gameState.lastFailedDiagram) {
                extraHtml = `
                    <div class="mt-8 bg-gray-900 p-6 border border-yellow-500 rounded max-w-2xl mx-auto shadow-[0_0_20px_rgba(234,179,8,0.2)]">
                        <h3 class="text-xl font-bold text-yellow-500 mb-2 border-b border-gray-700 pb-2">Relatório de Vulnerabilidade: O Funcionamento do Vírus</h3>
                        <p class="text-sm text-gray-300 mb-4">O vírus se camuflou usando o silogismo <b>${gameState.lastFailedDiagram.name}</b>. Para erradicá-lo, a configuração estrutural exata de vacina (Diagrama) exigida pelo sistema era esta abaixo:</p>
                        <div class="flex justify-center bg-black p-4 rounded border border-gray-800">

                    </button>
                </div>
            `;

                drawStaticVenn('correctCanvas', gameState.lastFailedDiagram.target);
            }

        function renderWin() {
            AudioEngine.playSuccess(); AudioEngine.stopBGM(); hud.classList.add('hidden');
            
            const titleMsg = gameState.isAvulso ? "MÓDULO CONCLUÍDO" : "AMEAÇA NEUTRALIZADA";
            const textMsg = gameState.isAvulso 
                ? `Treinamento finalizado com sucesso, Operador ${gameState.playerName}.`
                : `A lógica estruturada venceu o caos. O mainframe está seguro, Operador ${gameState.playerName}.`;

            container.innerHTML = `
                <div class="text-center space-y-6 mt-16 text-green-400">
                    <h1 class="text-5xl md:text-6xl font-bold mb-4 shadow-green-500 drop-shadow-[0_0_15px_rgba(34,197,94,0.8)]">${titleMsg}</h1>
                    <p class="text-2xl">${textMsg}</p>

                    </button>

        function updateHUD(level, phase) {
            hud.classList.remove('hidden');
            document.getElementById('level-display').innerText = `Nível: 0${level} | Fase: ${phase}/3`;
        }

        function startLevel(level, phase) {
            gameState.level = level; gameState.phase = phase; 
            updateHUD(level, phase);
            
            // Controle de Timer
            if (level === 1 && phase === 3 && !gameState.timerActive) {
                startTimer(60);
            } else if (level === 2 && phase === 3 && !gameState.timerActive) {
                startTimer(60);
            } else if (phase !== 3 || level === 3) {
                stopTimer();
            }

            if (level === 1) renderLevel1();
            if (level === 2) renderLevel2();
            if (level === 3) renderLevel3();
        }

        // ==========================================
        // NÍVEL 1: A ANATOMIA DO ARGUMENTO
        // ==========================================
        function renderLevel1() {
            const st = gameState.l1;
            const currentChallenge = st.challenges[st.currentIdx];

            const getSlotText = (slotName) => {
                const id = st.slots[slotName];

                    <div class="w-full md:w-1/2 flex flex-col justify-between h-[400px]">

                                <div onclick="l1AssignSlot('s_c')" class="slot-box flex-1 cursor-pointer rounded border-blue-500 ${st.slots.s_c ? 'slot-filled text-blue-300' : ''}">
                                    ${st.slots.s_c ? getSlotText('s_c') : '<span class="opacity-40 text-xs uppercase tracking-wider text-blue-500">Conclusão</span>'}
                                </div>
                            </div>
                        </div>
                        
                        <div class="bg-red-900 bg-opacity-10 p-3 rounded border border-red-800 h-1/3 flex flex-col justify-between">
                            <h3 class="font-bold text-red-400 text-xs mb-1">Quarentena (Ruído)</h3>
                            <div class="flex gap-2 flex-grow">
                                <div onclick="l1AssignSlot('s_n1')" class="slot-box border-red-500 flex-1 cursor-pointer rounded text-xs ${st.slots.s_n1 ? 'bg-red-900 bg-opacity-30 text-red-200' : ''}">${getSlotText('s_n1')}</div>
                                <div onclick="l1AssignSlot('s_n2')" class="slot-box border-red-500 flex-1 cursor-pointer rounded text-xs ${st.slots.s_n2 ? 'bg-red-900 bg-opacity-30 text-red-200' : ''}">${getSlotText('s_n2')}</div>

                        COMPILAR E VERIFICAR
                    </button>
                </div>
            `;
        }

        window.l1SelectPhrase = function(id) {
            AudioEngine.playClick();
            gameState.l1.selectedId = gameState.l1.selectedId === id ? null : id;
            renderLevel1();
        }

        window.l1AssignSlot = function(slotName) {
            AudioEngine.playClick();
            const st = gameState.l1;
            if (st.selectedId) {
                for (let key in st.slots) { if (st.slots[key] === st.selectedId) st.slots[key] = null; }
                st.slots[slotName] = st.selectedId; st.selectedId = null;
            } else if (st.slots[slotName]) {
                st.slots[slotName] = null;
            }
            renderLevel1();
        }

        window.l1Verify = function() {
            const st = gameState.l1;
            if (Object.values(st.slots).some(val => val === null)) {
                showMessage('Preencha todos os espaços!', true); AudioEngine.playError(); return;
            }

            const p1 = st.slots.s_p1, p2 = st.slots.s_p2, c = st.slots.s_c, n1 = st.slots.s_n1, n2 = st.slots.s_n2;
            const premisesCorrect = (p1 === 'p1' && p2 === 'p2') || (p1 === 'p2' && p2 === 'p1');
            const conclusionCorrect = c === 'c';
            const noiseCorrect = (n1 === 'n1' && n2 === 'n2') || (n1 === 'n2' && n2 === 'n1');

            if (premisesCorrect && conclusionCorrect && noiseCorrect) {
                AudioEngine.playSuccess(); showMessage('Código estruturado! Setor limpo.'); updateInfection(-10);
                st.currentIdx++;
                st.slots = { s_p1: null, s_p2: null, s_c: null, s_n1: null, s_n2: null };
                
                if(st.currentIdx < 3) { 
                    setTimeout(() => startLevel(1, st.currentIdx + 1), 1500); 
                } else { 
                    stopTimer();
                    if (gameState.isAvulso) { setTimeout(() => renderWin(), 2000); }
                    else { showMessage('Barreira Nível 1 superada.'); setTimeout(() => startLevel(2, 1), 2000); }
                }
            } else {
                AudioEngine.playError(); showMessage('Falha! Estrutura incorreta.', true);
                document.getElementById('game-container').classList.add('error-shake');
                setTimeout(() => document.getElementById('game-container').classList.remove('error-shake'), 400);
                updateInfection(20);
            }
        }

        // ==========================================
        // NÍVEL 2: O QUADRADO DAS OPOSIÇÕES & FORMALIZAÇÃO
        // ==========================================

            if (gameState.phase === 3) renderLevel2Phase3();
            else renderLevel2Phase12();
        }

        function renderLevel2Phase12() {
            const st = gameState.l2;
            const qList = gameState.phase === 1 ? st.qFase1 : st.qFase2;
            const q = qList[st.questionsCorrect];

            container.innerHTML = `
                <div class="mb-4 text-center md:text-left">
                    <h2 class="text-2xl font-bold mb-1">Nível 2: Oposições (${gameState.phase === 1 ? 'Simples' : 'Complexas'})</h2>
                    <p class="text-sm opacity-80">Firewall sob ataque! Classifique as proposições rapidamente.</p>
                    <p class="text-xs mt-1 text-blue-400">Pacotes bloqueados: ${st.questionsCorrect} / 4</p>
                </div>
                
                <div class="flex items-center justify-center min-h-[160px] bg-gray-900 border-2 border-green-500 rounded mb-6 relative overflow-hidden shadow-[0_0_20px_rgba(34,197,94,0.1)] p-6">
                    <div class="absolute inset-0 bg-green-500 opacity-5 animate-pulse"></div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <button onclick="l2Answer('${q.type}', 'A')" class="p-4 bg-blue-900 bg-opacity-30 border border-blue-500 hover:bg-blue-800 rounded flex flex-col items-center transition-transform hover:scale-105">
                        <span class="text-3xl font-bold text-blue-400">A</span><span class="text-xs font-bold mt-1">Universal Afirmativa</span>
                    </button>
                    <button onclick="l2Answer('${q.type}', 'E')" class="p-4 bg-red-900 bg-opacity-30 border border-red-500 hover:bg-red-800 rounded flex flex-col items-center transition-transform hover:scale-105">
                        <span class="text-3xl font-bold text-red-400">E</span><span class="text-xs font-bold mt-1">Universal Negativa</span>
                    </button>
                    <button onclick="l2Answer('${q.type}', 'I')" class="p-4 bg-yellow-900 bg-opacity-30 border border-yellow-500 hover:bg-yellow-800 rounded flex flex-col items-center transition-transform hover:scale-105">
                        <span class="text-3xl font-bold text-yellow-400">I</span><span class="text-xs font-bold mt-1">Particular Afirmativa</span>
                    </button>
                    <button onclick="l2Answer('${q.type}', 'O')" class="p-4 bg-purple-900 bg-opacity-30 border border-purple-500 hover:bg-purple-800 rounded flex flex-col items-center transition-transform hover:scale-105">
                        <span class="text-3xl font-bold text-purple-400">O</span><span class="text-xs font-bold mt-1">Particular Negativa</span>
                    </button>

        function renderLevel2Phase3() {
            const st = gameState.l2;

            const btnHtml = q.opts.map((opt, idx) => 
                `<button onclick="l2Phase3Answer(${q.ans}, ${idx})" class="p-4 bg-gray-800 border border-green-500 hover:bg-green-900 rounded text-xl font-bold transition-transform hover:scale-105">${opt}</button>`
            ).join('');

            container.innerHTML = `
                <div class="mb-4 text-center md:text-left">
                    <h2 class="text-2xl font-bold mb-1">Nível 2: Formalização Lógica</h2>

                    <p class="text-yellow-500 text-xs font-bold mt-1 animate-pulse">Ataque fulminante detectado! Restam 30 segundos.</p>
                    <p class="text-xs mt-1 text-blue-400">Traduções: ${st.questionsCorrect} / 4</p>
                </div>
                
                <div class="flex items-center justify-center min-h-[120px] bg-gray-900 border border-yellow-500 rounded mb-6 relative p-6">

        window.l2Answer = function(correctType, chosenType) {
            handleL2Progress(correctType === chosenType);
        }

        window.l2Phase3Answer = function(correctIdx, chosenIdx) {
            handleL2Progress(correctIdx === chosenIdx);
        }

        function handleL2Progress(isCorrect) {
            const st = gameState.l2;
            if (isCorrect) {
                AudioEngine.playClick(); updateInfection(-4); st.questionsCorrect++;
                if (st.questionsCorrect >= 4) {
                    AudioEngine.playSuccess(); showMessage(`Fase ${gameState.phase}/3 superada!`);
                    st.questionsCorrect = 0; 
                    if (gameState.phase < 3) { 
                        setTimeout(() => startLevel(2, gameState.phase + 1), 1500); 
                    } else { 
                        stopTimer();
                        if(gameState.isAvulso) { setTimeout(() => renderWin(), 2000); }
                        else { showMessage('Nível 2 concluído. Acessando o Núcleo...', false); setTimeout(() => startLevel(3, 1), 2000); }
                    }
                } else {
                    renderLevel2(); 
                }
            } else {
                AudioEngine.playError(); showMessage('Erro lógico! Vazamento de dados detectado.', true);
                document.getElementById('game-container').classList.add('error-shake');
                setTimeout(() => document.getElementById('game-container').classList.remove('error-shake'), 400);
                updateInfection(15);
            }
        }

        // ==========================================
        // NÍVEL 3: O ALQUIMISTA DE VENN
        // ==========================================
        function renderLevel3() {
            const st = gameState.l3;
            const currentDiag = st.challenges[st.currentIdx];

            container.innerHTML = `
                <div class="mb-4">
                    <h2 class="text-2xl font-bold mb-1">Nível 3: O Núcleo (${st.currentIdx + 1}/3)</h2>
                    <p class="text-sm opacity-80">Prove a validade da figura silogística clicando nas áreas do diagrama (Sombreado/Vazio ou X/Existência).</p>
                    <p class="text-xs text-yellow-500 mt-2 bg-yellow-900 bg-opacity-30 inline-block px-2 py-1 rounded border border-yellow-700">
                        DICA: ${currentDiag.hint}
                    </p>
                </div>

                <div class="bg-gray-900 p-4 border border-green-500 rounded mb-4 flex flex-col md:flex-row items-center shadow-lg">
                    <div class="w-full md:w-1/2 md:pr-4 space-y-2 text-sm bg-black p-4 rounded border border-gray-800 h-full flex flex-col justify-center">
                        <p class="font-bold border-b border-gray-700 pb-1 mb-2 text-white">Análise do Silogismo (${currentDiag.name}):</p>
                        ${currentDiag.desc}
                    </div>
                    <div class="w-full md:w-1/2 flex justify-center mt-4 md:mt-0 relative min-h-[300px]">
                        <canvas id="vennCanvas" width="350" height="300" class="border border-gray-700 rounded bg-black cursor-crosshair"></canvas>
                    </div>
                </div>

                <div class="flex flex-col md:flex-row justify-between items-center bg-black p-4 rounded border border-gray-800 gap-4">
                     <div class="flex flex-wrap justify-center gap-4 text-sm">
                        <span class="flex items-center"><span class="inline-block w-4 h-4 bg-green-500 bg-opacity-50 mr-2 rounded border border-green-400"></span> 1º Clique: Sombreado (Vazio)</span>
                        <span class="flex items-center"><span class="inline-block font-bold text-red-500 mr-2 text-lg">X</span> 2º Clique: Existência</span>
                    </div>
                    <button onclick="l3Verify()" class="w-full md:w-auto px-8 py-3 bg-green-600 text-black font-bold hover:bg-green-500 rounded uppercase shadow-[0_0_10px_rgba(34,197,94,0.4)] transition-transform hover:scale-105">
                        EXECUTAR PURGA
                    </button>
                </div>
            `;
            initCanvas();
        }

        const C_S = { x: 130, y: 120, r: 80 }, C_P = { x: 220, y: 120, r: 80 }, C_M = { x: 175, y: 200, r: 80 };
        const regCenters = [ {x: 90, y: 95}, {x: 260, y: 95}, {x: 175, y: 240}, {x: 175, y: 110}, {x: 130, y: 170}, {x: 220, y: 170}, {x: 175, y: 155} ];

        function initCanvas() {
            const canvas = document.getElementById('vennCanvas');
            const ctx = canvas.getContext('2d');
            
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                gameState.l3.regions.forEach((state, idx) => {
                    const c = regCenters[idx];
                    if (state === 1) { 
                        ctx.fillStyle = 'rgba(34, 197, 94, 0.4)'; ctx.beginPath(); ctx.arc(c.x, c.y, 16, 0, Math.PI * 2); ctx.fill();
                        ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 1;
                        for(let i=-10; i<=10; i+=4) { ctx.beginPath(); ctx.moveTo(c.x - 10, c.y + i); ctx.lineTo(c.x + 10, c.y + i); ctx.stroke(); }
                    } else if (state === 2) { 
                        ctx.fillStyle = '#ef4444'; ctx.font = 'bold 26px Courier New'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('X', c.x, c.y);
                    }
                });

                drawVennOutlines(ctx);
            }

            function getRegion(x, y) {
                const inS = Math.hypot(x - C_S.x, y - C_S.y) <= C_S.r, inP = Math.hypot(x - C_P.x, y - C_P.y) <= C_P.r, inM = Math.hypot(x - C_M.x, y - C_M.y) <= C_M.r;
                if (inS && !inP && !inM) return 0; if (!inS && inP && !inM) return 1; if (!inS && !inP && inM) return 2;
                if (inS && inP && !inM) return 3; if (inS && !inP && inM) return 4; if (!inS && inP && inM) return 5;
                if (inS && inP && inM) return 6; return -1;
            }

            canvas.addEventListener('click', (e) => {
                const rect = canvas.getBoundingClientRect(); const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                const reg = getRegion(x, y);
                if (reg !== -1) { AudioEngine.playClick(); gameState.l3.regions[reg] = (gameState.l3.regions[reg] + 1) % 3; draw(); }
            });
            draw();
        }

        function drawStaticVenn(canvasId, targetRegions) {
            const canvas = document.getElementById(canvasId);
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            targetRegions.forEach((state, idx) => {
                const c = regCenters[idx];
                if (state === 1) { 
                    ctx.fillStyle = 'rgba(34, 197, 94, 0.4)'; ctx.beginPath(); ctx.arc(c.x, c.y, 16, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 1;
                    for(let i=-10; i<=10; i+=4) { ctx.beginPath(); ctx.moveTo(c.x - 10, c.y + i); ctx.lineTo(c.x + 10, c.y + i); ctx.stroke(); }
                } else if (state === 2) { 
                    ctx.fillStyle = '#ef4444'; ctx.font = 'bold 26px Courier New'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('X', c.x, c.y);
                }
            });
            drawVennOutlines(ctx);
        }

        function drawVennOutlines(ctx) {
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#3b82f6'; ctx.beginPath(); ctx.arc(C_S.x, C_S.y, C_S.r, 0, Math.PI*2); ctx.stroke();
            ctx.strokeStyle = '#eab308'; ctx.beginPath(); ctx.arc(C_P.x, C_P.y, C_P.r, 0, Math.PI*2); ctx.stroke();
            ctx.strokeStyle = '#a855f7'; ctx.beginPath(); ctx.arc(C_M.x, C_M.y, C_M.r, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = '#3b82f6'; ctx.font = 'bold 16px Courier New'; ctx.fillText('S', C_S.x - C_S.r + 15, C_S.y - C_S.r + 15);
            ctx.fillStyle = '#eab308'; ctx.fillText('P', C_P.x + C_P.r - 20, C_P.y - C_P.r + 15);
            ctx.fillStyle = '#a855f7'; ctx.fillText('M', C_M.x - 10, C_M.y + C_M.r + 15);
        }

        window.l3Verify = function() {
            const st = gameState.l3; const currentDiag = st.challenges[st.currentIdx];
            if (JSON.stringify(st.regions) === JSON.stringify(currentDiag.target)) {
                AudioEngine.playSuccess(); showMessage('Lógica Exata! Purga executada.'); updateInfection(-20);
                st.currentIdx++; st.regions = [0, 0, 0, 0, 0, 0, 0]; 
                if (st.currentIdx < 3) { setTimeout(() => startLevel(3, st.currentIdx + 1), 2000); } 
                else { setTimeout(() => renderWin(), 2000); }
            } else {
                AudioEngine.playError(); showMessage('Diagrama incorreto! O vírus expandiu.', true);
                document.getElementById('game-container').classList.add('error-shake');
                setTimeout(() => document.getElementById('game-container').classList.remove('error-shake'), 400);
                
                // Salva a referência do diagrama para o caso da infecção atingir 100% no próximo update
                gameState.lastFailedDiagram = currentDiag;
                updateInfection(35);
            }
        }

        renderIntro();
    </script>
</body>
</html>
