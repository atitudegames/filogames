<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jogo da Internet Segura - Edição Completa</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
    margin:0;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:#0f172a;
    color:#fff;
}
header{
    padding:15px;
    background:#1e293b;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    border-bottom: 2px solid #334155;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}
#setup{
    padding:30px;
    max-width:500px;
    margin:40px auto;
    text-align:center;
    background: #1e293b;
    border-radius: 12px;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
}
input{
    padding:12px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #475569;
    background: #0f172a;
    color: white;
    width:90%;
    font-size: 16px;
}
button{
    padding:12px 24px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:#fff;
    font-weight:bold;
    font-size: 16px;
    cursor:pointer;
    margin-top:15px;
    transition: background 0.2s;
}
button:hover { background: #2563eb; }

/* ESTILO DOS CRÉDITOS */
.credits {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid #334155;
    font-size: 14px;
    color: #cbd5e1;
    line-height: 1.5;
}
.credits strong { color: #60a5fa; }

#game{ display:none; }

#board{
    display:grid;
    grid-template-columns: repeat(10, 1fr); 
    gap:6px;
    padding:20px;
    padding-bottom: 140px; 
    max-width:900px;
    margin:auto;
}

@media (max-width: 600px) {
    #board { grid-template-columns: repeat(5, 1fr); }
}

.cell{
    background:#334155;
    border-radius:8px;
    min-height:70px;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    border: 1px solid #475569;
    font-size: 14px;
    transition: transform 0.2s;
}
.cell:hover { z-index: 10; transform: scale(1.05); }

.good { background:#0ea5e9; border-color: #38bdf8; box-shadow: inset 0 0 10px rgba(255,255,255,0.2); }
.bad { background:#ef4444; border-color: #f87171; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
.mystery { background:#eab308; color:#000; border-color: #facc15; font-size: 16px; }

.players{
    position:absolute;
    bottom:4px;
    display:flex;
    gap:3px;
    flex-wrap:wrap;
    justify-content: center;
    width: 100%;
}
.player{
    width:14px;
    height:14px;
    border-radius:50%;
    border: 2px solid #fff;
    box-shadow: 0 0 5px rgba(0,0,0,0.8);
    position:relative;
}

#controls{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(5px);
    border-top: 1px solid #334155;
    padding:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    z-index:999;
    box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.3);
}
#dice-area {
    display: flex;
    align-items: center;
    gap: 10px;
}
#dice{
    font-size:32px;
    font-weight:bold;
    color: #facc15;
    width: 40px;
    text-align: center;
}
#turn-indicator {
    background: #334155;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 15px;
    border: 1px solid #475569;
}
</style>
</head>
<body>

<header>🛡️ Internet Segura: O Jogo</header>

<div id="setup">
    <h2>Vamos lá!</h2>
    <p>Digite os nomes dos jogadores:</p>
    <input id="p1" placeholder="Jogador 1"><br>
    <input id="p2" placeholder="Jogador 2"><br>
    <input id="p3" placeholder="Jogador 3 (opcional)"><br>
    <input id="p4" placeholder="Jogador 4 (opcional)"><br>
    <button onclick="startGame()">Iniciar Partida</button>

    <div class="credits">
        <p>👨‍🏫 Jogo desenvolvido pelo<br>
        <strong>Prof. Marco Antonio da Silva Filho</strong><br>
        (Filosofia)</p>
        
        <p style="font-size: 0.85em; margin-top: 15px; opacity: 0.7;">
            ✨ Criado com apoio de Inteligência Artificial<br>
            (ChatGPT & Gemini)
        </p>
    </div>
</div>

<div id="game">
    <div id="board"></div>

    <div id="controls">
        <div id="turn-indicator">Vez de: <b id="current-player-name">...</b></div>
        <div id="dice-area">
            <button onclick="rollDice()" style="margin:0; background:#22c55e;">🎲 Rolar Dado</button>
            <div id="dice">-</div>
        </div>
    </div>
</div>

<script>
const total = 80;
const board = document.getElementById('board');
const diceEl = document.getElementById('dice');
const currentPlayerNameEl = document.getElementById('current-player-name');

let players = [];
let positions = [];
let current = 0;
const colors = ['#f87171','#4ade80','#60a5fa','#c084fc']; 

// --- CASAS FIXAS (AZUL E VERMELHA) ---
const fixedEvents = {
    // BOAS PRÁTICAS (AZUL - Avança)
    4:  { type: 'good', move: 2, text: "🛡️ Você criou uma senha longa (frase-senha). Segurança máxima! Avance 2 casas." },
    12: { type: 'good', move: 3, text: "🔒 Você ativou a autenticação em dois fatores (2FA). Conta blindada! Avance 3 casas." },
    22: { type: 'good', move: 2, text: "🤝 Você viu um amigo sendo excluído no grupo e o defendeu. Empatia digital! Avance 2 casas." },
    35: { type: 'good', move: 3, text: "👁️ Você cobriu a webcam quando não estava usando. Privacidade física! Avance 3 casas." },
    48: { type: 'good', move: 2, text: "🧹 Você fez uma limpa nas redes sociais e removeu estranhos. Círculo de confiança! Avance 2 casas." },
    55: { type: 'good', move: 3, text: "📧 Você identificou um e-mail de Phishing (golpe) pelos erros de português e não clicou. Avance 3 casas." },
    66: { type: 'good', move: 4, text: "🧠 Você verificou uma notícia em 3 sites diferentes antes de compartilhar. Fim da Fake News! Avance 4 casas." },
    73: { type: 'good', move: 2, text: "💾 Você fez backup das suas fotos na nuvem. Dados salvos! Avance 2 casas." },

    // MÁS PRÁTICAS (VERMELHO - Volta)
    8:  { type: 'bad', move: -2, text: "🚫 Você aceitou todos os cookies de um site suspeito sem ler. Volte 2 casas." },
    17: { type: 'bad', move: -3, text: "📢 Você postou fotos com o uniforme da escola (localização exposta). Perigo! Volte 3 casas." },
    29: { type: 'bad', move: -4, text: "☠️ Você baixou um arquivo .exe enviado por um desconhecido no Discord. Vírus! Volte 4 casas." },
    41: { type: 'bad', move: -3, text: "🤬 Você xingou alguém nos comentários (Cyberbullying). Respeito é fundamental. Volte 3 casas." },
    52: { type: 'bad', move: -3, text: "🔑 Você usou a mesma senha para o e-mail, jogos e redes sociais. Efeito dominó! Volte 3 casas." },
    61: { type: 'bad', move: -4, text: "📱 Você usou o Wi-Fi aberto da praça para acessar o banco. Seus dados foram interceptados! Volte 4 casas." },
    70: { type: 'bad', move: -3, text: "📸 Você compartilhou um print de uma conversa privada sem permissão. Quebra de confiança. Volte 3 casas." },
    78: { type: 'bad', move: -5, text: "🎣 Você acreditou que ganhou um iPhone grátis e digitou seu CPF. Golpe! Volte 5 casas." }
};

// --- CARTAS DE MISTÉRIO (AMARELO) ---
const mysteryCards = [
    // POSITIVAS
    { move: 2, text: "❓ MISTÉRIO: Você denunciou um perfil falso (fake) que imitava seu amigo. Boa ação! (+2 Casas)" },
    { move: 1, text: "❓ MISTÉRIO: Você bloqueou a tela do celular antes de sair da sala. Segurança básica. (+1 Casa)" },
    { move: 2, text: "❓ MISTÉRIO: Você ensinou seus pais a identificar um site seguro (cadeado HTTPS). Educação digital! (+2 Casas)" },
    { move: 3, text: "❓ MISTÉRIO: Detetive Digital! Você percebeu que a foto de perfil era gerada por IA (Deepfake). (+3 Casas)" },
    { move: 2, text: "❓ MISTÉRIO: Você recusou compartilhar sua localização em tempo real num app desnecessário. (+2 Casas)" },
    { move: 1, text: "❓ MISTÉRIO: Você atualizou o antivírus do computador. (+1 Casa)" },
    { move: 2, text: "❓ MISTÉRIO: Você pensou duas vezes antes de postar uma piada de mau gosto. (+2 Casas)" },
    { move: 3, text: "❓ MISTÉRIO: Equilíbrio! Você trocou 1 hora de TikTok por leitura de um livro. (+3 Casas)" },
    { move: 2, text: "❓ MISTÉRIO: Você não respondeu a trolls na internet. Paz mental garantida. (+2 Casas)" },
    { move: 1, text: "❓ MISTÉRIO: Você revisou as permissões dos seus aplicativos instalados. (+1 Casa)" },

    // NEGATIVAS
    { move: -2, text: "❓ MISTÉRIO: Você compartilhou sua senha com seu 'melhor amigo'. Nunca faça isso! (-2 Casas)" },
    { move: -1, text: "❓ MISTÉRIO: Você esqueceu de deslogar do computador da escola/lan house. (-1 Casa)" },
    { move: -3, text: "❓ MISTÉRIO: Você clicou em 'Li e Concordo' sem ler nada e vendeu seus dados. (-3 Casas)" },
    { move: -2, text: "❓ MISTÉRIO: Você marcou no Story que a casa estava vazia (viagem). Risco de roubo! (-2 Casas)" },
    { move: -2, text: "❓ MISTÉRIO: Você usou a data de nascimento como senha (123456). Tente novamente. (-2 Casas)" },
    { move: -3, text: "❓ MISTÉRIO: Você riu e compartilhou um vídeo humilhando um colega. Cúmplice de bullying. (-3 Casas)" },
    { move: -2, text: "❓ MISTÉRIO: Você salvou os dados do cartão de crédito no navegador de um PC compartilhado. Perigo! (-2 Casas)" },
    { move: -1, text: "❓ MISTÉRIO: Vício! Você dormiu com o celular debaixo do travesseiro e acordou cansado. (-1 Casa)" },
    { move: -2, text: "❓ MISTÉRIO: Você instalou um 'Mod' de jogo que prometia moedas infinitas e era vírus. (-2 Casas)" },
    { move: -2, text: "❓ MISTÉRIO: Você conversou com estranhos em um chat anônimo sem supervisão. Risco alto. (-2 Casas)" }
];

const mysteryHouses = new Set();
while(mysteryHouses.size < 20){
    let n = Math.floor(Math.random() * (total - 5)) + 2; 
    if(!fixedEvents[n]) mysteryHouses.add(n);
}

function startGame(){
    players = [p1.value||"Jogador 1", p2.value||"Jogador 2"];
    if(p3.value) players.push(p3.value);
    if(p4.value) players.push(p4.value);

    positions = new Array(players.length).fill(1);
    
    document.getElementById('setup').style.display="none";
    document.getElementById('game').style.display="block";

    createBoard();
    updateUI();
}

function createBoard(){
    board.innerHTML='';
    for(let i=1; i<=total; i++){
        const d = document.createElement('div');
        d.className = 'cell';
        d.id = `cell-${i}`;
        
        if(fixedEvents[i]){
            d.classList.add(fixedEvents[i].type); 
            d.innerHTML = `<div>${i}</div>`;
        } else if(mysteryHouses.has(i)){
            d.classList.add('mystery');
            d.innerHTML = `<div>?</div>`;
        } else {
            d.innerHTML = `<div>${i}</div>`;
        }
        
        d.innerHTML += `<div class="players"></div>`;
        board.appendChild(d);
    }
}

function updateUI(){
    document.querySelectorAll('.players').forEach(p => p.innerHTML='');
    
    positions.forEach((pos, i)=>{
        if(pos > total) pos = total;
        if(pos < 1) pos = 1;
        
        const cell = board.children[pos-1];
        if(cell) {
            const slot = cell.querySelector('.players');
            const dot = document.createElement('div');
            dot.className = 'player';
            dot.style.background = colors[i];
            dot.title = players[i];
            slot.appendChild(dot);
        }
    });

    currentPlayerNameEl.innerText = players[current];
    currentPlayerNameEl.style.color = colors[current];
}

async function moveStep(playerIndex, target){
    if(target > total) target = total;
    if(target < 1) target = 1;

    const startPos = positions[playerIndex];
    const direction = startPos < target ? 1 : -1;
    
    if(startPos === target) return;

    while(positions[playerIndex] !== target){
        positions[playerIndex] += direction;
        updateUI();
        await new Promise(r => setTimeout(r, 150)); 
    }
}

async function rollDice(){
    const btn = document.querySelector('#controls button');
    btn.disabled = true;
    btn.style.opacity = "0.5";
    btn.innerText = "...";

    for(let i=0; i<5; i++){
        diceEl.innerText = Math.floor(Math.random()*6)+1;
        await new Promise(r => setTimeout(r, 60));
    }

    let roll = Math.floor(Math.random() * 6) + 1;
    diceEl.innerText = roll;

    let start = positions[current];
    let end = start + roll;
    
    await moveStep(current, end);
    
    await new Promise(r => setTimeout(r, 300));
    await checkTileEffect();

    if(positions[current] >= total){
        alert(`🎉 PARABÉNS! ${players[current]} venceu o Jogo da Internet Segura!`);
        location.reload();
        return;
    }

    current = (current + 1) % players.length;
    updateUI();

    btn.disabled = false;
    btn.style.opacity = "1";
    btn.innerText = "🎲 Rolar Dado";
}

async function checkTileEffect(){
    let pos = positions[current];

    if(fixedEvents[pos]){
        const evt = fixedEvents[pos];
        alert(evt.text); 
        let newPos = pos + evt.move;
        await moveStep(current, newPos);
    }
    else if(mysteryHouses.has(pos)){
        const card = mysteryCards[Math.floor(Math.random() * mysteryCards.length)];
        alert(card.text);
        let newPos = pos + card.move;
        await moveStep(current, newPos);
    }
}
</script>
</body>
</html>
